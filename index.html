<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ICT OLYMPIAD SEASON 1 - PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', 'Hind Siliguri', sans-serif;
        background-color: #010409;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        color: #f8fafc;
      }
      #initial-load {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #010409;
        z-index: 9999;
      }
      .loader-bar {
        width: 100px;
        height: 2px;
        background: #1e293b;
        position: relative;
        overflow: hidden;
        border-radius: 4px;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        width: 40%;
        height: 100%;
        background: #06b6d4;
        animation: loading 1.5s infinite ease-in-out;
      }
      @keyframes loading {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      .hidden-load {
        display: none !important;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>
<body>
    <div id="initial-load">
        <div class="mb-4 font-black tracking-widest text-cyan-500 text-[10px] uppercase">ICT OLYMPIAD S1</div>
        <div class="loader-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      setTimeout(() => {
        const loader = document.getElementById('initial-load');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(() => loader.classList.add('hidden-load'), 500);
        }
      }, 8000);
    </script>
</body>
</html>
